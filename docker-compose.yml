version: "3.9"
services:

  backend:
    build: ./backend
    container_name: finstream-backend
    restart: unless-stopped
    environment:
      - QUEUE_MAX_SIZE=500
      - PRODUCER_THREADS=5
      - CONSUMER_BATCH_SIZE=50
      - WS_BROADCAST_INTERVAL_MS=100
      - BACKPRESSURE_STRATEGY=DROP
      - DB_PATH=/app/data/finstream.db
      - ALLOWED_ORIGINS=["http://localhost","http://frontend"]
    volumes:
      - finstream-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/symbols"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: finstream-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  finstream-data:
    driver: local
